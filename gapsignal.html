<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GapSignal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F3EE;
  --surface: #FFFFFF;
  --border: #E0DDD6;
  --text-primary: #1A1917;
  --text-secondary: #6B6860;
  --text-muted: #A09D98;
  --radius: 10px;
  --radius-lg: 14px;
}
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 2rem 1rem;
  color: var(--text-primary);
}
.app { max-width: 600px; margin: 0 auto; }
.nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.nav h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.nav-tabs { display: flex; gap: 6px; }
.tab-btn {
  padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; color: var(--text-secondary); transition: all 0.15s;
}
.tab-btn.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
.page { display: none; }
.page.active { display: block; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
}
.rows-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
.row-item {
  display: grid; grid-template-columns: 28px 80px 1fr 1fr 32px;
  gap: 8px; align-items: center;
}
.row-headers {
  display: grid; grid-template-columns: 28px 80px 1fr 1fr 32px;
  gap: 8px; margin-bottom: 4px; padding: 0 2px;
}
.row-headers span {
  font-size: 11px; font-weight: 500; color: var(--text-muted);
  letter-spacing: 0.4px; text-transform: uppercase;
}
.row-num {
  font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace;
  color: var(--text-muted); text-align: center; padding-top: 2px;
}
input[type="number"], input[type="text"] {
  height: 40px; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0 10px; font-size: 14px; font-family: 'DM Mono', monospace;
  color: var(--text-primary); background: var(--bg); outline: none; width: 100%;
  transition: border-color 0.15s, background 0.15s;
}
input:focus { border-color: var(--text-primary); background: #fff; }
input::placeholder { color: var(--text-muted); font-size: 13px; }
.del-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; color: var(--text-muted); font-size: 16px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
}
.del-btn:hover { border-color: #c0392b; color: #c0392b; background: #fdecea; }
.btn-row { display: flex; gap: 8px; }
.btn {
  height: 42px; border-radius: var(--radius); border: 1px solid var(--border);
  font-size: 14px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500;
  cursor: pointer; transition: all 0.15s; padding: 0 18px;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--text-primary); color: #fff; border-color: var(--text-primary); flex: 1; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { background: transparent; color: var(--text-secondary); }
.btn-secondary:hover { background: var(--bg); }
.btn-add { background: transparent; color: var(--text-secondary); font-size: 13px; }
.btn-add:hover { background: var(--bg); }
.results-wrap { display: flex; flex-direction: column; gap: 10px; }
.result-item {
  border-radius: var(--radius-lg); padding: 1rem 1.25rem; border: 1px solid;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.result-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.result-id {
  font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace;
  opacity: 0.55; min-width: 18px;
}
.result-symbol { font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace; opacity: 0.7; }
.result-rate { font-size: 28px; font-weight: 500; font-family: 'DM Mono', monospace; letter-spacing: -0.5px; line-height: 1; }
.result-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  padding: 2px 9px; border-radius: 5px; border: 1px solid; margin-left: auto;
}
.result-text { font-size: 13px; line-height: 1.7; }
.result-note { font-size: 12px; line-height: 1.6; margin-top: 8px; padding-top: 8px; border-top: 1px solid; opacity: 0.8; display: none; }
.result-note.show { display: block; }

/* 綠：負數（賣掉） */
.t-green { background:#E8F5E9; border-color:#A5D6A7; color:#1B5E20; }
.t-green .result-badge { background:#E8F5E9; border-color:#1B5E20; color:#1B5E20; }
.t-green .result-note  { border-color:#A5D6A7; }

/* 灰：無事 / 健康 */
.t-gray  { background:#F3F2EF; border-color:#C8C5BC; color:#3D3C39; }
.t-gray  .result-badge { background:#F3F2EF; border-color:#3D3C39; color:#3D3C39; }
.t-gray  .result-note  { border-color:#C8C5BC; }

/* 紅：高開 */
.t-red   { background:#FDECEA; border-color:#EFAAAA; color:#7F1D1D; }
.t-red   .result-badge { background:#FDECEA; border-color:#7F1D1D; color:#7F1D1D; }
.t-red   .result-note  { border-color:#EFAAAA; }

/* SETTINGS */
.settings-section { margin-bottom: 1.5rem; }
.settings-section h2 {
  font-size: 13px; font-weight: 700; color: var(--text-secondary);
  letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 0.75rem;
}
.setting-row { display: grid; grid-template-columns: 120px 1fr; gap: 10px; align-items: start; margin-bottom: 10px; }
.setting-row label { font-size: 13px; color: var(--text-secondary); padding-top: 10px; }
.setting-row input[type="number"] { height: 40px; width: 100px; }
.setting-row textarea {
  width: 100%; min-height: 60px; padding: 8px 10px; font-size: 13px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); color: var(--text-primary); resize: vertical; outline: none;
  line-height: 1.6; font-family: 'Noto Sans TC', sans-serif;
  transition: border-color 0.15s, background 0.15s;
}
.setting-row textarea:focus { border-color: var(--text-primary); background: #fff; }
.divider { height: 1px; background: var(--border); margin: 1rem 0; }
.settings-actions { display: flex; flex-direction: column; gap: 8px; }
.btn-export { background: var(--text-primary); color: #fff; border-color: var(--text-primary); width: 100%; }
.btn-export:hover { opacity: 0.85; }
.btn-import-wrap { position: relative; }
.btn-import-wrap input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; height: 42px; width: 100%; border: none; background: transparent;
}
.btn-import { width: 100%; pointer-events: none; }
.btn-reset { color: #7F1D1D; border-color:#EFAAAA; }
.btn-reset:hover { background: #FDECEA; }
.hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.6; }
.range-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  color: var(--text-secondary); background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 3px 10px; display: inline-block;
  margin: 10px 0 4px;
}
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border);
  padding: 1.5rem; width: 100%; max-width: 360px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12); animation: fadeIn 0.15s ease;
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 0.5rem; }
.modal p { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; line-height: 1.6; }
.modal input { margin-bottom: 1rem; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns .btn { flex: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <h1>GapSignal</h1>
    <div class="nav-tabs">
      <button class="tab-btn active" id="tab-calc" onclick="switchTab('calc')">計算</button>
      <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">設定</button>
    </div>
  </div>

  <!-- CALC PAGE -->
  <div class="page active" id="page-calc">
    <div class="card">
      <div class="row-headers">
        <span>#</span>
        <span>代號（選填）</span>
        <span>昨日收盤</span>
        <span>今日開盤</span>
        <span></span>
      </div>
      <div class="rows-wrap" id="rows-wrap"></div>
      <button class="btn btn-add" onclick="addRow()">＋ 新增一筆</button>
      <div style="margin-top:1rem;" class="btn-row">
        <button class="btn btn-primary" onclick="calculateAll()">計算全部</button>
        <button class="btn btn-secondary" onclick="resetAll()">重設</button>
      </div>
    </div>
    <div class="results-wrap" id="results-wrap"></div>
  </div>

  <!-- SETTINGS PAGE -->
  <div class="page" id="page-settings">
    <div class="card">
      <div class="settings-section">
        <h2>區間臨界值（%）</h2>
        <div class="setting-row">
          <label>無事上限</label>
          <div>
            <input type="number" id="s-threshold1" step="0.1" oninput="updateRangeLabels()" />
            <p class="hint">0% 以上、此值以下 → 無事（灰）</p>
          </div>
        </div>
        <div class="setting-row">
          <label>健康上限</label>
          <div>
            <input type="number" id="s-threshold2" step="0.1" oninput="updateRangeLabels()" />
            <p class="hint">無事上限 以上、此值以下 → 健康（灰）；此值以上 → 高開（紅）</p>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="settings-section">
        <h2>判斷文字</h2>

        <div class="range-label" id="label-neg"></div>
        <div class="setting-row"><label>標題</label><input type="text" id="s-neg-badge" /></div>
        <div class="setting-row"><label>說明</label><textarea id="s-neg-text"></textarea></div>

        <div class="range-label" id="label-low"></div>
        <div class="setting-row"><label>標題</label><input type="text" id="s-low-badge" /></div>
        <div class="setting-row"><label>說明</label><textarea id="s-low-text"></textarea></div>

        <div class="range-label" id="label-mid"></div>
        <div class="setting-row"><label>標題</label><input type="text" id="s-mid-badge" /></div>
        <div class="setting-row"><label>說明</label><textarea id="s-mid-text"></textarea></div>

        <div class="range-label" id="label-high"></div>
        <div class="setting-row"><label>標題</label><input type="text" id="s-high-badge" /></div>
        <div class="setting-row"><label>說明</label><textarea id="s-high-text"></textarea></div>
        <div class="setting-row"><label>備註</label><textarea id="s-high-note"></textarea></div>
      </div>

      <div class="divider"></div>

      <div class="settings-actions">
        <button class="btn btn-export" onclick="exportHTML()">設為預設並匯出新檔</button>
        <div class="btn-import-wrap">
          <input type="file" accept=".html" onchange="importHTML(event)" />
          <button class="btn btn-secondary btn-import">匯入設定檔（.html）</button>
        </div>
        <button class="btn btn-secondary btn-reset" onclick="resetSettings()">恢復預設值</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>確認檔名</h3>
    <p>請確認匯出的 HTML 檔名，下載後取代原有檔案即可套用新預設。</p>
    <input type="text" id="modal-filename" />
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmExport()">下載</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_SETTINGS = {
  threshold1: 3,
  threshold2: 5,
  neg:  { badge: '立刻賣掉',        text: '開盤低於昨日收盤，建議立即出場，控制風險。', note: '' },
  low:  { badge: '無事，平安的一天', text: '開盤漲幅在正常範圍內，今日變化不大，可持股觀望。', note: '' },
  mid:  { badge: '健康可觀望',       text: '盤面偏多健康，買賣皆可，視個人策略操作。', note: '' },
  high: { badge: '高開，留意風險',   text: '高幅開盤，建議觀望半小時。若沒有跌破 3%，可考慮續抱，後續可能衝高。',
          note: '備註：若盤中漲至 6–7%，可考慮減半持股（賣一半），鎖定部分獲利。' }
};

const EMBEDDED_SETTINGS = null; // EMBEDDED_SETTINGS_PLACEHOLDER

let cfg = EMBEDDED_SETTINGS
  ? JSON.parse(JSON.stringify(EMBEDDED_SETTINGS))
  : JSON.parse(JSON.stringify(DEFAULT_SETTINGS));

let rowCount = 0;
let rowOrder = [];

function init() {
  loadSettingsToForm();
  addRow();
}

function switchTab(tab) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'settings') loadSettingsToForm();
  if (tab === 'calc') saveSettingsFromForm();
}

function getLetter(n) {
  var letters = '';
  while (n > 0) {
    n--;
    letters = String.fromCharCode(65 + (n % 26)) + letters;
    n = Math.floor(n / 26);
  }
  return letters;
}

function refreshLabels() {
  var rows = document.getElementById('rows-wrap').querySelectorAll('.row-item');
  rows.forEach(function(row, i) {
    var lbl = row.querySelector('.row-num');
    if (lbl) lbl.textContent = getLetter(i + 1);
  });
}

function addRow() {
  rowCount++;
  var id = rowCount;
  rowOrder.push(id);
  var wrap = document.getElementById('rows-wrap');
  var div = document.createElement('div');
  div.className = 'row-item';
  div.id = 'row-' + id;
  div.innerHTML =
    '<span class="row-num"></span>' +
    '<input type="text" placeholder="代號" id="sym-' + id + '" />' +
    '<input type="number" placeholder="昨收" id="prev-' + id + '" step="0.01" min="0" />' +
    '<input type="number" placeholder="今開" id="today-' + id + '" step="0.01" min="0" />' +
    '<button class="del-btn" onclick="delRow(' + id + ')" title="刪除">&times;</button>';
  wrap.appendChild(div);
  refreshLabels();
}

function delRow(id) {
  var rows = document.querySelectorAll('.row-item');
  if (rows.length <= 1) return;
  var el = document.getElementById('row-' + id);
  if (el) el.remove();
  refreshLabels();
}

function resetAll() {
  document.getElementById('rows-wrap').innerHTML = '';
  document.getElementById('results-wrap').innerHTML = '';
  rowCount = 0;
  rowOrder = [];
  addRow();
}

function calculateAll() {
  saveSettingsFromForm();
  var rows = document.getElementById('rows-wrap').querySelectorAll('.row-item');
  var resultsWrap = document.getElementById('results-wrap');
  resultsWrap.innerHTML = '';
  var hasResult = false;
  var idx = 0;

  rows.forEach(function(row) {
    var id = row.id.replace('row-', '');
    var sym   = (document.getElementById('sym-' + id) ? document.getElementById('sym-' + id).value : '').trim();
    var prev  = parseFloat(document.getElementById('prev-' + id) ? document.getElementById('prev-' + id).value : '');
    var today = parseFloat(document.getElementById('today-' + id) ? document.getElementById('today-' + id).value : '');
    if (isNaN(prev) || isNaN(today) || prev <= 0) return;
    hasResult = true;
    idx++;

    var letter = getLetter(idx);
    var rate = ((today - prev) / prev) * 100;
    var sign = rate >= 0 ? '+' : '';
    var rateStr = sign + rate.toFixed(2) + '%';

    var theme, badge, text, note = '';
    if (rate < 0) {
      theme = 't-green'; badge = cfg.neg.badge;  text = cfg.neg.text;  note = cfg.neg.note || '';
    } else if (rate < cfg.threshold1) {
      theme = 't-gray';  badge = cfg.low.badge;  text = cfg.low.text;  note = cfg.low.note || '';
    } else if (rate < cfg.threshold2) {
      theme = 't-gray';  badge = cfg.mid.badge;  text = cfg.mid.text;  note = cfg.mid.note || '';
    } else {
      theme = 't-red';   badge = cfg.high.badge; text = cfg.high.text; note = cfg.high.note || '';
    }

    var label = letter + (sym ? ' · ' + sym : '');

    var div = document.createElement('div');
    div.className = 'result-item ' + theme;
    div.innerHTML =
      '<div class="result-header">' +
        '<span class="result-id">' + label + '</span>' +
        '<span class="result-rate">' + rateStr + '</span>' +
        '<span class="result-badge">' + badge + '</span>' +
      '</div>' +
      '<div class="result-text">' + text + '</div>' +
      (note ? '<div class="result-note show">' + note + '</div>' : '');
    resultsWrap.appendChild(div);
  });

  if (!hasResult) alert('請至少填入一筆有效的昨收與今開價格。');
}

function updateRangeLabels() {
  var t1 = parseFloat(document.getElementById('s-threshold1').value) || cfg.threshold1;
  var t2 = parseFloat(document.getElementById('s-threshold2').value) || cfg.threshold2;
  document.getElementById('label-neg').textContent  = '< 0%　負數';
  document.getElementById('label-low').textContent  = '0% ~ ' + t1 + '%　無事';
  document.getElementById('label-mid').textContent  = t1 + '% ~ ' + t2 + '%　健康';
  document.getElementById('label-high').textContent = '> ' + t2 + '%　高開';
}

function loadSettingsToForm() {
  document.getElementById('s-threshold1').value = cfg.threshold1;
  document.getElementById('s-threshold2').value = cfg.threshold2;
  updateRangeLabels();
  document.getElementById('s-neg-badge').value  = cfg.neg.badge;
  document.getElementById('s-neg-text').value   = cfg.neg.text;
  document.getElementById('s-low-badge').value  = cfg.low.badge;
  document.getElementById('s-low-text').value   = cfg.low.text;
  document.getElementById('s-mid-badge').value  = cfg.mid.badge;
  document.getElementById('s-mid-text').value   = cfg.mid.text;
  document.getElementById('s-high-badge').value = cfg.high.badge;
  document.getElementById('s-high-text').value  = cfg.high.text;
  document.getElementById('s-high-note').value  = cfg.high.note;
}

function saveSettingsFromForm() {
  var t1 = parseFloat(document.getElementById('s-threshold1').value);
  var t2 = parseFloat(document.getElementById('s-threshold2').value);
  if (!isNaN(t1)) cfg.threshold1 = t1;
  if (!isNaN(t2)) cfg.threshold2 = t2;
  cfg.neg.badge  = document.getElementById('s-neg-badge').value;
  cfg.neg.text   = document.getElementById('s-neg-text').value;
  cfg.low.badge  = document.getElementById('s-low-badge').value;
  cfg.low.text   = document.getElementById('s-low-text').value;
  cfg.mid.badge  = document.getElementById('s-mid-badge').value;
  cfg.mid.text   = cfg.mid.text = document.getElementById('s-mid-text').value;
  cfg.high.badge = document.getElementById('s-high-badge').value;
  cfg.high.text  = document.getElementById('s-high-text').value;
  cfg.high.note  = document.getElementById('s-high-note').value;
}

function resetSettings() {
  if (!confirm('確定要恢復所有預設值嗎？')) return;
  cfg = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  loadSettingsToForm();
}

function exportHTML() {
  saveSettingsFromForm();
  var now = new Date();
  var stamp = now.getFullYear().toString() +
    String(now.getMonth()+1).padStart(2,'0') +
    String(now.getDate()).padStart(2,'0');
  document.getElementById('modal-filename').value = 'gapsignal_' + stamp;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function confirmExport() {
  var filename = document.getElementById('modal-filename').value.trim();
  if (!filename) { alert('請輸入檔名'); return; }
  if (!filename.endsWith('.html')) filename += '.html';

  var src = document.documentElement.outerHTML;
  var embedded = JSON.stringify(cfg);
  var updated = src.replace(
    /const EMBEDDED_SETTINGS = .*?; \/\/ EMBEDDED_SETTINGS_PLACEHOLDER/,
    'const EMBEDDED_SETTINGS = ' + embedded + '; // EMBEDDED_SETTINGS_PLACEHOLDER'
  );

  var blob = new Blob([updated], { type: 'text/html;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  closeModal();
}

function importHTML(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var content = e.target.result;
    var match = content.match(/const EMBEDDED_SETTINGS = (.+?); \/\/ EMBEDDED_SETTINGS_PLACEHOLDER/);
    if (!match) { alert('找不到設定資料，請確認是否為正確的匯出檔案。'); return; }
    try {
      cfg = JSON.parse(match[1]);
      loadSettingsToForm();
      alert('設定已成功匯入！');
    } catch(err) {
      alert('設定檔格式錯誤，無法匯入。');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('page-calc').classList.contains('active')) {
    calculateAll();
  }
});

init();
</script>
